<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" dir="rtl" lang="fa-IR" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="/public/assets/images/logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/table.css" />
    <title>TDDT</title>
  </head>
  <body>
    <header>
      <section class="header__top d-flex">
        <div class="navbar__wrapper d-flex">
          <div class="navbar__wrapper__logo d-flex">
            <a href="/index.html"
              ><img src="./public/assets/images/logo.png" alt="logo"
            /></a>
          </div>
          <nav class="navbar__wrapper__links d-flex">
            <ul class="navbar__links d-flex">
              <li class="navbar__link">
                <a href="index.html" class="nav-link">صفحه اصلی</a>
              </li>
              <li class="navbar__link">
                <a href="table.html" class="nav-link">جدول</a>
              </li>
              <li class="navbar__link">
                <a href="dropdown.html" class="nav-link">لیست کشویی</a>
              </li>
              <li class="navbar__link">
                <a href="tree.html" class="nav-link">درخت</a>
              </li>
              <li class="navbar__link">
                <a href="resume.html" class="nav-link">درباره من</a>
              </li>
            </ul>
          </nav>
          <div class="navbar__wrapper__theme-changer d-flex">
            <span
              ><img src="./public/assets/icons/light-mode.svg" alt="theme"
            /></span>
          </div>
        </div>
      </section>
    </header>
    <main>
      <section class="table__wrapper">
        <div class="table__top">
          <div class="table__title">لیست محصولات</div>
          <div class="table__qty">
            <label for="table__qty-id">تعداد در هر صفحه</label>
            <select name="tableQTY" id="table__qty-id">
              <option value="2">2</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="10">10</option>
            </select>
          </div>
        </div>
        <div class="table__main">
          <table>
            <thead>
              <tr>
                <th>ردیف <span data-value="ردیف" class="sort">سورت</span></th>
                <th>
                  عکس محصول <span data-value="عکس" class="sort">سورت</span>
                </th>
                <th>
                  نام محصول <span data-value="اسم" class="sort">سورت</span>
                </th>
                <th>تعداد <span data-value="تعداد" class="sort">سورت</span></th>
                <th>قیمت <span data-value="قیمت" class="sort">سورت</span></th>
                <th>تاریخ <span data-value="تاریخ" class="sort">سورت</span></th>
                <th>
                  موجودی <span data-value="موجودی" class="sort">سورت</span>
                </th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
      <section class="pagination__wrapper">
        <div class="pagination__arrow first__page">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="800px"
            height="800px"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M18 17L13 12L18 7M11 17L6 12L11 7"
              stroke="#000000"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div class="pagination__arrow prev__page">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="800px"
            height="800px"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M15 6L9 12L15 18"
              stroke="#000000"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div class="pagination__numbers__wrapper"></div>
        <div class="pagination__arrow next__page">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="800px"
            height="800px"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M9 6L15 12L9 18"
              stroke="#000000"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div class="pagination__arrow last__page">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="800px"
            height="800px"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M6 17L11 12L6 7M13 17L18 12L13 7"
              stroke="#000000"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </section>
    </main>
    <footer>
      <section class="footer__top">
        <div class="footer__wrapper">
          <div class="footer__wrapper__socials">
            <ul>
              <li>
                <a href="#"
                  ><img src="/public/assets/icons/git.svg" alt="social"
                /></a>
              </li>
              <li>
                <a href="#"
                  ><img src="/public/assets/icons/linkedin.svg" alt="social"
                /></a>
              </li>
              <li>
                <a href="#"
                  ><img src="/public/assets/icons/rubika.svg" alt="social"
                /></a>
              </li>
              <li>
                <a href="#"
                  ><img src="/public/assets/icons/telegram.svg" alt="social"
                /></a>
              </li>
              <li>
                <a href="#"
                  ><img src="/public/assets/icons/instagram.svg" alt="social"
                /></a>
              </li>
            </ul>
          </div>
          <div class="footer__wrapper__links">
            <ul>
              <li><a href="/index.html">صفحه اصلی</a></li>
              <li><a href="/table.html">جدول</a></li>
              <li><a href="/dropdown.html">لیست کشویی</a></li>
              <li><a href="/tree.html">درخت</a></li>
              <li><a href="/resume.html">رزومه</a></li>
            </ul>
          </div>
        </div>
      </section>
      <section class="footer__bottom">
        <p class="footer__bottom__copy-right">تمامی حقوق برای طراح محفوظ است</p>
      </section>
    </footer>
  </body>
  <script src="./js/script.js"></script>
  <script src="./js/darkTheme.js"></script>
  <script src="./js/products.js"></script>
</html>
