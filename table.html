<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" dir="rtl" lang="fa-IR" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="/public/assets/images/logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/table.css" />
    <title>TDDT</title>
  </head>
  <body>
    <div id="header-placeHolder"></div>
    <main>
      <section class="table__wrapper">
        <div class="table__top">
          <div class="table__title">لیست محصولات</div>
          <!-- <select class="table__add__new__item">
            اضافه نمودن محصول

            <option value="modal">مودال</option>
            <option value="sideBar">سایدبار</option>
          </select> -->
          <div class="menu-wrapper">
            <button class="table__add__new__item">
              اضافه نمودن محصول
              <span class="table__add__new__item__icon"
                ><img src="/public/assets/icons/chevron-up.svg" alt="arrow"
              /></span>
            </button>
            <ul class="table__add__new__item__list">
              <li data-value="open-modal">مودال</li>
              <li data-value="open-sideBar">سایدبار</li>
            </ul>
          </div>
          <div class="table__qty">
            <label for="table__qty-id">تعداد در هر صفحه</label>
            <select name="tableQTY" id="table__qty-id">
              <option value="5">5</option>
              <option value="10">10</option>
              <option value="25">25</option>
            </select>
          </div>
        </div>
        <div class="table__main">
          <table>
            <thead>
              <tr>
                <th data-value="ردیف">
                  ردیف <span class="sort sort-arrow"></span>
                </th>
                <th>عکس محصول</th>
                <th data-value="اسم">
                  نام محصول <span class="sort sort-arrow"></span>
                </th>
                <th data-value="تعداد">
                  تعداد <span class="sort sort-arrow"></span>
                </th>
                <th data-value="قیمت">
                  قیمت <span class="sort sort-arrow"></span>
                </th>
                <th data-value="تاریخ">
                  تاریخ <span class="sort sort-arrow"></span>
                </th>
                <th>
                  موجودی
                  <span data-value="موجودی" class="sort"
                    ><select name="" id="available">
                      <option value="همه">همه</option>
                      <option value="بله">بله</option>
                      <option value="خیر">خیر</option>
                      <option value="درحال تامین">درحال تامین</option>
                    </select></span
                  >
                </th>
                <th>تغییر دادن</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <!-- delete row -->
        <div class="delete__modal modal hidden">
          <h2>آیا از حذف این ردیف مطمئن هستید؟</h2>
          <div class="modal__btns__wrapper">
            <button type="submit" class="delete__modal--confirm__btn">
              بله
            </button>
            <button type="submit" class="delete__modal--cancel__btn">
              انصراف
            </button>
          </div>
        </div>
        <!-- edit Item Modal -->
        <div class="edit__modal modal hidden">
          <form action="#" id="modify-form">
            <div class="modal__wrapper__inputs">
              <!-- تغییر نام محصول -->
              <label for="modal-name" class="edit__modal--label"
                >نام محصول</label
              >
              <input
                type="text"
                class="edit__modal--input"
                id="modal-name"
                required
              />
            </div>
            <div class="modal__wrapper__inputs">
              <!-- تغییر عکس محصول -->
              <label for="modal-img" class="edit__modal--label"
                >عکس محصول</label
              >
              <input
                type="file"
                accept="image/*"
                class="edit__modal--input"
                id="modal-img"
              />
              <img id="modal-img-preview" width="150" />
            </div>

            <div class="modal__wrapper__inputs">
              <!-- تغییر تعداد محصول -->
              <label for="modal-qty" class="edit__modal--label">تعداد</label
              ><input
                type="number"
                class="edit__modal--input"
                id="modal-qty"
                required
                min="0"
              />
              <!-- تغییر قیمت محصول -->
              <label for="modal-price" class="edit__modal--label">قیمت</label>
              <input
                type="text"
                class="edit__modal--input"
                id="modal-price"
                required
              />
            </div>
            <div class="modal__wrapper__inputs">
              <!-- تغییر تاریخ محصول -->
              <label for="modal-date" class="edit__modal--label">تاریخ</label>
              <input
                type="text"
                class="edit__modal--input"
                id="modal-date"
                required
              />
              <!-- تغییر موجود بودن محصول -->
              <label for="modal-available" class="edit__modal--label"
                >موجودی</label
              >
              <select name="" id="modal-available">
                <option value="بله">بله</option>
                <option value="خیر">خیر</option>
                <option value="درحال تامین">درحال تامین</option>
              </select>
            </div>

            <h2>آیا از تغییر این ردیف مطمئن هستید؟</h2>
            <div class="modal__btns__wrapper">
              <button type="submit" class="edit__modal--confirm__btn">
                بله
              </button>
              <button type="submit" class="edit__modal--cancel__btn">
                انصراف
              </button>
            </div>
          </form>
        </div>
        <!-- add New Item Modal -->
        <div class="add__modal modal hidden">
          <form action="#" id="new-item-form">
            <div class="modal__wrapper__inputs">
              <!-- تغییر نام محصول -->
              <label for="modal-new-name" class="edit__modal--label"
                >نام محصول</label
              >
              <input
                type="text"
                class="edit__modal--input"
                id="modal-new-name"
                placeholder="هندزفری"
              />
            </div>
            <div class="modal__wrapper__inputs">
              <!-- تغییر عکس محصول -->
              <label for="modal-new-img" class="edit__modal--label"
                >عکس محصول</label
              >
              <input
                type="file"
                accept="image/*"
                class="edit__modal--input"
                id="modal-new-img"
              />
              <img id="modal-new-img-preview" width="150" />
            </div>

            <div class="modal__wrapper__inputs">
              <!-- تغییر تعداد محصول -->
              <label for="modal-new-qty" class="edit__modal--label">تعداد</label
              ><input
                type="number"
                class="edit__modal--input"
                id="modal-new-qty"
                min="0"
                placeholder="0"
              />
              <!-- تغییر قیمت محصول -->
              <label for="modal-new-price" class="edit__modal--label"
                >قیمت</label
              >
              <input
                type="text"
                class="edit__modal--input"
                id="modal-new-price"
                placeholder="10,000"
              />
            </div>
            <div class="modal__wrapper__inputs">
              <!-- تغییر تاریخ محصول -->
              <label for="modal-new-date" class="edit__modal--label"
                >تاریخ</label
              >
              <input
                type="text"
                class="edit__modal--input"
                id="modal-new-date"
                placeholder="1400/01/01"
              />
              <!-- تغییر موجود بودن محصول -->
              <label for="modal-new-available" class="edit__modal--label"
                >موجودی</label
              >
              <select name="" id="modal-new-available">
                <option value="بله">بله</option>
                <option value="خیر">خیر</option>
                <option value="درحال تامین">درحال تامین</option>
              </select>
            </div>

            <h2>آیا از اضافه نمودن این ردیف مطمئن هستید؟</h2>
            <div class="modal__btns__wrapper">
              <button type="submit" class="add__modal--confirm__btn">
                بله
              </button>
              <button type="submit" class="add__modal--cancel__btn">
                انصراف
              </button>
            </div>
          </form>
        </div>
        <!-- add New Item Modal -->
        <!-- sidebar -->
        <div class="edit__sideBar">
          <form action="#" id="modify-form-sideBar">
            <!-- تغییر نام محصول -->
            <label for="sideBar-name" class="edit__modal--label"
              >نام محصول</label
            >
            <input
              type="text"
              class="edit__modal--input"
              id="sideBar-name"
              required
            />

            <!-- تغییر عکس محصول -->
            <label for="sideBar-img" class="edit__modal--label"
              >عکس محصول</label
            >
            <input
              type="file"
              accept="image/*"
              class="edit__modal--input"
              id="sideBar-img"
            />
            <img id="sideBar-preview" width="150" />
            <!-- تغییر تعداد محصول -->
            <label for="sideBar-qty" class="edit__modal--label">تعداد</label
            ><input
              type="number"
              class="edit__modal--input"
              id="sideBar-qty"
              required
              min="0"
            />
            <!-- تغییر قیمت محصول -->
            <label for="sideBar-price" class="edit__modal--label">قیمت</label>
            <input
              type="text"
              class="edit__modal--input"
              id="sideBar-price"
              required
            />

            <!-- تغییر تاریخ محصول -->
            <label for="sideBar-date" class="edit__modal--label">تاریخ</label>
            <input
              type="text"
              class="edit__modal--input"
              id="sideBar-date"
              required
            />
            <!-- تغییر موجود بودن محصول -->
            <label for="sideBar-available" class="edit__modal--label"
              >موجودی</label
            >
            <select name="" id="sideBar-available">
              <option value="بله">بله</option>
              <option value="خیر">خیر</option>
              <option value="درحال تامین">درحال تامین</option>
            </select>

            <h2></h2>
            <div class="modal__btns__wrapper">
              <button type="submit" class="edit__sideBar--confirm__btn">
                بله
              </button>
              <button type="submit" class="edit__sideBar--cancel__btn">
                انصراف
              </button>
            </div>
          </form>
        </div>
        <!-- sidebar -->
      </section>
      <section class="pagination__wrapper">
        <div class="pagination__arrow first__page">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="800px"
            height="800px"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M18 17L13 12L18 7M11 17L6 12L11 7"
              stroke="#000000"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div class="pagination__arrow prev__page">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="800px"
            height="800px"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M15 6L9 12L15 18"
              stroke="#000000"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div class="pagination__numbers__wrapper"></div>
        <div class="pagination__arrow next__page">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="800px"
            height="800px"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M9 6L15 12L9 18"
              stroke="#000000"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div class="pagination__arrow last__page">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="800px"
            height="800px"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M6 17L11 12L6 7M13 17L18 12L13 7"
              stroke="#000000"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </section>
    </main>
    <div class="overlay hidden"></div>
    <div id="footer-placeHolder"></div>
  </body>
  <script src="./js/script.js"></script>
  <!-- <script src="./js/darkTheme.js"></script> -->
  <script src="./js/products.js"></script>
</html>
